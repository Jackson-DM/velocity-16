<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VELOCITY-16</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .arcade { border: 4px solid #333; padding: 20px; background: #111; border-radius: 8px; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        canvas { background: #000; width: 480px; height: 320px; image-rendering: pixelated; display: block; }
        .ui { display: flex; justify-content: space-between; padding: 10px 0; font-size: 12px; }
        .status-led { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #ff7700; margin-right: 5px; }
        .status-led.active { background: #00ff66; box-shadow: 0 0 8px #00ff66; }
        button { background: #000; color: #ff00ff; border: 2px solid #ff00ff; padding: 10px 20px; cursor: pointer; text-transform: uppercase; margin-top: 20px; width: 100%; }
        button:hover { background: #ff00ff; color: #000; }
    </style>
</head>
<body>
    <div class="arcade">
        <div class="ui">
            <div><span id="statusLed" class="status-led"></span> <span id="statusText">ENGINE: STANDBY</span></div>
            <div id="speedometer">0 KM/H</div>
        </div>
        <canvas id="gameCanvas" width="240" height="160"></canvas>
        <button id="startBtn">Initialize Engine</button>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
