<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELOCITY-16</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    /* Wrapper sizes itself to the game canvas via inline-block */
    #game-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
    }
    canvas#game {
      /* SNES native 320×224, CSS integer-scaled — pixel-perfect, no blur */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
    canvas#hud {
      /* Overlay at full display resolution — text rasterises natively, never blurry */
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;   /* pass all input through to game */
      image-rendering: auto;  /* smooth, high-quality text */
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="320" height="224"></canvas>
    <canvas id="hud"></canvas>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
